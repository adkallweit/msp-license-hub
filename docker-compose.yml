version: "3"

services:

 api:
  build: .
  ports:
   - "8000:8000"
  env_file:
   - .env
  depends_on:
   - postgres
   - redis

 worker:
  build: .
  command: python backend/worker.py
  env_file:
   - .env
  depends_on:
   - postgres

 scheduler:
  build: .
  command: python backend/scheduler.py
  env_file:
   - .env

 postgres:
  image: postgres:15
  environment:
   POSTGRES_DB: billing
   POSTGRES_USER: billing
   POSTGRES_PASSWORD: billing
  volumes:
   - pgdata:/var/lib/postgresql/data

 redis:
  image: redis

volumes:
 pgdata:
